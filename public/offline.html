<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0f1a" />
  <title>CrewNotice — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
    }
    .icon-wrap svg {
      width: 40px;
      height: 40px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    p {
      font-size: 14px;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .hint {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 24px;
      padding: 12px 18px;
      background: #f1f5f9;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
      padding: 12px 28px;
      border-radius: 12px;
      border: none;
      background: #3b82f6;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
      transition: background 0.2s;
    }
    .retry-btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon-wrap">
      <!-- Anchor icon (CrewNotice logo) -->
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="5" r="3" />
        <line x1="12" y1="22" x2="12" y2="8" />
        <path d="M5 12H2a10 10 0 0020 0h-3" />
      </svg>
    </div>
    <h1>You&rsquo;re Offline</h1>
    <p>Cached documents and previously viewed notices are still available.</p>
    <p>Connect to the internet to access the full CrewNotice experience.</p>
    <div class="hint">
      Documents you saved for offline access can be found in your Profile &rarr; Offline Documents.
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
      </svg>
      Try Again
    </button>
  </div>
</body>
</html>
